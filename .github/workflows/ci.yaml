name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  prepare:
    name: 'Prepare workflow'
    uses: eliashaeussler/gha/.github/workflows/preparation.yaml@61021346542aab8ca5cd441199b82b05db5c67fd # 0.6.0

  checks:
    name: 'Checks'

    needs: [prepare]
    if: ${{ needs.prepare.outputs.continue == 'true' }}

    permissions:
      security-events: write

    uses: eliashaeussler/gha/.github/workflows/checks.yaml@61021346542aab8ca5cd441199b82b05db5c67fd # 0.6.0
    with:
      # We use the minimum supported PHP version
      php-version: 8.2 # renovate-ignore

  tests:
    name: 'Tests (PHP ${{ matrix.php-version }} & ${{ matrix.dependencies }} dependencies)'

    needs: [prepare]
    if: ${{ needs.prepare.outputs.continue == 'true' }}

    strategy:
      fail-fast: false
      matrix:
        php-version: ["8.2", "8.3", "8.4", "8.5"]
        dependencies: ["highest", "lowest"]

    uses: eliashaeussler/gha/.github/workflows/composer-tests.yaml@61021346542aab8ca5cd441199b82b05db5c67fd # 0.6.0
    with:
      php-version: ${{ matrix.php-version }}
      composer-version: ${{ matrix.composer-version }}
      dependencies: ${{ matrix.dependencies }}

  test-coverage:
    name: 'Test coverage'

    needs: [prepare]
    if: ${{ needs.prepare.outputs.continue == 'true' }}

    uses: eliashaeussler/gha/.github/workflows/composer-test-coverage.yaml@61021346542aab8ca5cd441199b82b05db5c67fd # 0.6.0
